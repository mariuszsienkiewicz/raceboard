# docker-compose.yml

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    depends_on:
      - database
      - redis
      - meilisearch
    environment:
      DATABASE_URL: postgresql://raceboard:raceboard@database:5432/raceboard?serverVersion=16&charset=utf8
      REDIS_URL: redis://redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: raceboard_master_key
      MESSENGER_TRANSPORT_DSN: redis://redis:6379/messages

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 500

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: raceboard
      POSTGRES_USER: raceboard
      POSTGRES_PASSWORD: raceboard
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: raceboard_master_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  db_data:
  meilisearch_data: